<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Scanner - Fixed Upload</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --bg-dark: #020202;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 30px 3px 0 3px; /* Quy tắc 3 mép */
            display: flex;
            justify-content: center;
        }

        .main-frame {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 900px;
        }

        .box {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px 15px;
            text-align: center;
            position: relative; /* Quan trọng để đè input */
        }

        /* Vùng chứa nút bấm và input ẩn */
        .upload-area {
            position: relative;
            width: 85%;
            margin: 0 auto 15px auto;
            overflow: hidden;
        }

        .btn-design {
            display: block;
            width: 100%;
            padding: 12px;
            border-radius: 5px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            pointer-events: none; /* Để click xuyên qua nút xuống input bên dưới */
            transition: 0.3s;
        }

        .blue-ui { border: 2px solid var(--neon-blue); color: var(--neon-blue); }
        .purple-ui { border: 2px solid var(--neon-purple); color: var(--neon-purple); }

        /* Input file thật sự - trong suốt và đè lên trên cùng */
        .hidden-input {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
        }

        .display-num {
            font-size: 8rem;
            font-weight: 900;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 5px 0;
            text-shadow: 0 0 25px currentColor;
        }

        .countdown-text { font-family: monospace; font-size: 1.4rem; margin-bottom: 10px; }
        .progress-container { width: 100%; height: 6px; background: #111; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; transition: width 0.1s linear; }
        .blue-bar { background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }
        .purple-bar { background: var(--neon-purple); box-shadow: 0 0 10px var(--neon-purple); }
        
        .storage-tag { font-size: 0.6rem; color: #444; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="main-frame">
        <div class="box">
            <div class="upload-area">
                <div class="btn-design blue-ui">CHỌN FILE 1 (7s)</div>
                <input type="file" class="hidden-input" accept=".txt" onchange="handleFile(this, 1)">
            </div>
            <div id="num1" class="display-num" style="color: var(--neon-blue);">--</div>
            <div class="countdown-text" id="time1">0.0s</div>
            <div class="progress-container">
                <div class="progress-bar blue-bar" id="bar1"></div>
            </div>
            <div id="save1" class="storage-tag">READY</div>
        </div>

        <div class="box">
            <div class="upload-area">
                <div class="btn-design purple-ui">CHỌN FILE 2 (30s)</div>
                <input type="file" class="hidden-input" accept=".txt" onchange="handleFile(this, 2)">
            </div>
            <div id="num2" class="display-num" style="color: var(--neon-purple);">--</div>
            <div class="countdown-text" id="time2">0.0s</div>
            <div class="progress-container">
                <div class="progress-bar purple-bar" id="bar2"></div>
            </div>
            <div id="save2" class="storage-tag">READY</div>
        </div>
    </div>

    <script>
        const config = {
            1: { digits: [], index: 0, interval: 7000, lastUpdate: 0, timer: null },
            2: { digits: [], index: 0, interval: 30000, lastUpdate: 0, timer: null }
        };

        window.onload = () => {
            [1, 2].forEach(id => {
                const data = localStorage.getItem(`neon_save_data_${id}`);
                const idx = localStorage.getItem(`neon_save_idx_${id}`);
                if (data) {
                    config[id].digits = JSON.parse(data);
                    config[id].index = idx ? parseInt(idx) : 0;
                    document.getElementById(`save${id}`).innerText = "LOADED FROM MEMORY";
                    config[id].lastUpdate = Date.now();
                    animate(id);
                }
            });
        };

        function handleFile(input, id) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const digits = e.target.result.replace(/\D/g, '').split('');
                if (digits.length > 0) {
                    config[id].digits = digits;
                    config[id].index = 0;
                    localStorage.setItem(`neon_save_data_${id}`, JSON.stringify(digits));
                    localStorage.setItem(`neon_save_idx_${id}`, 0);
                    document.getElementById(`save${id}`).innerText = "NEW FILE SAVED";
                    config[id].lastUpdate = Date.now();
                    if (config[id].timer) cancelAnimationFrame(config[id].timer);
                    animate(id);
                }
            };
            reader.readAsText(file);
        }

        function animate(id) {
            const item = config[id];
            const now = Date.now();
            const elapsed = now - item.lastUpdate;
            const remaining = Math.max(0, item.interval - elapsed);
            
            const percent = (elapsed / item.interval) * 100;
            document.getElementById(`bar${id}`).style.width = Math.min(percent, 100) + '%';
            document.getElementById(`time${id}`).innerText = (remaining/1000).toFixed(1) + "s";

            if (elapsed >= item.interval || (item.index === 0 && elapsed <= 20)) {
                if (item.index < item.digits.length) {
                    document.getElementById(`num${id}`).innerText = item.digits[item.index];
                    item.index++;
                    localStorage.setItem(`neon_save_idx_${id}`, item.index);
                    item.lastUpdate = now;
                } else {
                    document.getElementById(`num${id}`).innerText = "END";
                    return;
                }
            }
            item.timer = requestAnimationFrame(() => animate(id));
        }
    </script>
</body>
</html>
